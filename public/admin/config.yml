backend:
  name: github
  repo: Indices-Technology/Zahalfoundation
  branch: main
  # OAuth sign-in is handled by this app's own /auth + /callback routes (server/routes),
  # so it works on Vercel without Netlify. Update if you move to a custom domain.
  base_url: https://zahalfoundation.org

# Uploaded images are committed to the repo and served from /images/uploads
media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  # --- Site settings (brand, contact, social, logo) -------------------------
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Brand & Contact
        file: content/site.json
        fields:
          - { name: name, label: Site name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: description, label: Meta description, widget: text }
          - name: logo
            label: Logo
            widget: object
            fields:
              - { name: light, label: Logo (light, for dark areas), widget: image }
              - { name: dark, label: Logo (dark, for light areas), widget: image }
              - { name: lightColored, label: Logo (coloured), widget: image }
          - name: contact
            label: Contact
            widget: object
            fields:
              - { name: email, label: Email, widget: string }
              - { name: phone, label: Phone, widget: string }
              - { name: address, label: Address, widget: string }
              - { name: welcomeText, label: Welcome text, widget: string }
          - name: social
            label: Social links
            widget: list
            fields:
              - { name: icon, label: Icon class (e.g. fab fa-twitter), widget: string }
              - { name: url, label: URL, widget: string }

  # --- Homepage hero --------------------------------------------------------
  - name: home
    label: Homepage
    files:
      - name: hero
        label: Hero slider
        file: content/home.json
        fields:
          - name: hero
            label: Slides
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: image, label: Background image, widget: image }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: buttonLabel, label: Button label, widget: string }
              - { name: buttonUrl, label: Button link, widget: string }
          - name: budget
            label: Budget chart
            widget: object
            fields:
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: text, label: Intro text, widget: text }
              - name: segments
                label: Segments
                widget: list
                summary: "{{fields.label}} ({{fields.value}}%)"
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value (number), widget: number, value_type: int, min: 0 }
                  - { name: color, label: Colour (hex), widget: string }
                  - { name: icon, label: Icon class, widget: string }
                  - { name: description, label: Description, widget: text }
          - name: video
            label: Video section
            widget: object
            fields:
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: url, label: "Video URL (YouTube/Vimeo link or .mp4 path)", widget: string }
              - { name: poster, label: Poster image, widget: image, required: false }

  # --- Causes ---------------------------------------------------------------
  - name: causes
    label: Causes
    files:
      - name: causes
        label: Causes list
        file: content/causes.json
        fields:
          - name: items
            label: Causes
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: thumbnail, label: Image, widget: image }
              - { name: title, label: Title, widget: string }
              - { name: category, label: Category, widget: string }
              - { name: excerpt, label: Excerpt, widget: text }
              - name: amount
                label: Amount
                widget: object
                fields:
                  - { name: raised, label: Raised, widget: string }
                  - { name: goal, label: Goal, widget: string }
              - { name: url, label: Link, widget: string, default: /causes-details }

  # --- Events ---------------------------------------------------------------
  - name: events
    label: Events
    files:
      - name: events
        label: Events list
        file: content/events.json
        fields:
          - name: items
            label: Events
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: thumbnail, label: Image, widget: image }
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: time, label: Time, widget: string }
              - { name: date, label: Date (HTML allowed), widget: string }
              - { name: url, label: Link, widget: string, default: /events-details }

  # --- News -----------------------------------------------------------------
  - name: news
    label: News
    files:
      - name: news
        label: News list
        file: content/news.json
        fields:
          - name: items
            label: Posts
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: thumbnail, label: Image, widget: image }
              - { name: title, label: Title, widget: string }
              - { name: author, label: Author, widget: string, default: Admin }
              - { name: date, label: Date, widget: string }
              - { name: commentCount, label: Comment count, widget: string, default: "0" }
              - { name: excerpt, label: Excerpt, widget: text }
              - { name: url, label: Link, widget: string, default: /news-details }

  # --- Volunteers -----------------------------------------------------------
  - name: volunteers
    label: Volunteers
    files:
      - name: volunteers
        label: Volunteers list
        file: content/volunteers.json
        fields:
          - name: items
            label: Volunteers
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: thumbnail, label: Photo, widget: image }
              - { name: title, label: Name, widget: string }
              - { name: designation, label: Role, widget: string, default: Volunteer }
              - { name: excerpt, label: Short bio, widget: text }
              - name: social
                label: Social links
                widget: list
                fields:
                  - { name: icon, label: Icon class, widget: string }
                  - { name: url, label: URL, widget: string }

  # --- Gallery --------------------------------------------------------------
  - name: gallery
    label: Gallery
    files:
      - name: gallery
        label: Gallery images
        file: content/gallery.json
        fields:
          - name: items
            label: Images
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: thumbnail, label: Image, widget: image }
              - { name: title, label: Title, widget: string }
              - { name: category, label: Category, widget: string }

  # --- Testimonials ---------------------------------------------------------
  - name: testimonials
    label: Testimonials
    files:
      - name: testimonials
        label: Testimonials list
        file: content/testimonials.json
        fields:
          - name: items
            label: Testimonials
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: thumbnail, label: Photo, widget: image }
              - { name: name, label: Name, widget: string }
              - { name: designation, label: Role, widget: string }
              - { name: excerpt, label: Quote, widget: text }
